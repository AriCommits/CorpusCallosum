services:
  chroma:
    image: chromadb/chroma:0.6.3
    container_name: corpus-chroma
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  corpus_api:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
    container_name: corpus-api
    restart: unless-stopped
    depends_on:
      chroma:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - CORPUS_CALLOSUM_CONFIG=/app/configs/corpus_callosum.docker.yaml
      - PYTHONPATH=/app/src
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=corpus-callosum
    env_file:
      - path: ../configs/.env
        required: false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../configs:/app/configs:ro
      - ../vault:/app/vault
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.0
    container_name: otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
      - otel_logs:/var/log/otel
    ports:
      - "127.0.0.1:4317:4317"   # OTLP gRPC
      - "127.0.0.1:4318:4318"   # OTLP HTTP
      - "127.0.0.1:8889:8889"   # Prometheus metrics
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # Optional: Add Jaeger for trace visualization
  # Uncomment to enable UI at http://localhost:16686
  # jaeger:
  #   image: jaegertracing/all-in-one:1.54
  #   container_name: jaeger
  #   restart: unless-stopped
  #   ports:
  #     - "127.0.0.1:16686:16686"  # Jaeger UI
  #     - "127.0.0.1:14268:14268"  # HTTP collector
  #   environment:
  #     - COLLECTOR_OTLP_ENABLED=true

volumes:
  chroma_data:
  otel_logs:
